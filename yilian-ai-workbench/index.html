<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>羿链 AI 工作台 - 全生命周期完整原型</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #fff;
      --soft: #f7f9fc;
      --soft-2: #eef4ff;
      --line: #e7edf4;
      --line-strong: #d8e2ee;
      --text: #1f2937;
      --muted: #6b778c;
      --subtle: #a6b0bf;
      --primary: #3478f6;
      --primary-strong: #2368e8;
      --primary-soft: #eef5ff;
      --blue: #3478f6;
      --blue-soft: #eef5ff;
      --green: #13966a;
      --green-soft: #eaf8f2;
      --amber: #d97706;
      --amber-soft: #fff7e8;
      --red: #dc4c45;
      --red-soft: #fff1f0;
      --violet: #6b59b5;
      --violet-soft: #f1eeff;
      --shadow: 0 10px 30px rgba(31, 41, 55, .08);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 1220px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 228px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: #f7f9fd;
      color: #4f5f75;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 20;
      border-right: 1px solid var(--line);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: block;
      background: linear-gradient(135deg, #22d3ee 0 48%, transparent 49%),
        linear-gradient(315deg, #5b7cfa 0 44%, transparent 45%),
        #12c7b7;
      color: transparent;
      font-size: 0;
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      right: -2px;
      bottom: -2px;
      border-radius: 2px;
      background: #5b7cfa;
      border: 2px solid #f7f9fd;
    }
    .brand strong { display: block; color: #1f2937; font-size: 15px; font-weight: 900; }
    .brand span { display: block; margin-top: 3px; color: #9aa5b5; font-size: 12px; }
    .nav {
      overflow: auto;
      padding-right: 2px;
      display: grid;
      gap: 12px;
    }
    .nav-group-title {
      margin: 10px 0 4px;
      color: #9aa5b5;
      font-size: 12px;
      font-weight: 700;
    }
    .nav-btn {
      width: 100%;
      min-height: 36px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #5f6f86;
      padding: 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      white-space: nowrap;
      font-weight: 700;
    }
    .nav-btn svg, .btn svg, .icon-btn svg { width: 16px; height: 16px; flex: 0 0 16px; }
    .nav-btn:hover { background: #eef3fb; color: var(--primary); }
    .nav-btn.active { background: #eaf2ff; color: var(--primary); }
    .nav-btn.active svg { color: var(--primary); }
    .side-status {
      margin-top: auto;
      border: 1px solid #dce8ff;
      border-radius: 8px;
      background: #f0f6ff;
      padding: 12px;
      display: grid;
      gap: 7px;
    }
    .side-status strong { color: #1f2937; }
    .side-status p { margin: 0; color: #6b778c; line-height: 1.5; font-size: 12px; }

    .workspace { min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      min-height: 58px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .top-left, .top-right, .row, .actions { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .select, .input, .textarea {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: 0;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .select:focus, .input:focus, .textarea:focus, .search:focus-within, .field:focus-within {
      border-color: #9fc0ff;
      box-shadow: 0 0 0 3px rgba(52, 120, 246, .12);
    }
    .select { height: 36px; padding: 0 12px; }
    .input { height: 36px; padding: 0 12px; }
    .textarea { width: 100%; min-height: 84px; padding: 10px 12px; line-height: 1.55; resize: vertical; }
    .search {
      width: min(360px, 30vw);
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      color: var(--muted);
    }
    .search input { border: 0; outline: 0; width: 100%; background: transparent; color: var(--text); }
    .main { padding: 20px 24px 36px; display: grid; gap: 16px; }
    .page-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    h1 { margin: 0; font-size: 20px; line-height: 1.22; letter-spacing: 0; font-weight: 850; }
    h2, h3 { margin: 0; letter-spacing: 0; }
    .page-desc { margin: 6px 0 0; color: var(--muted); line-height: 1.55; }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 750;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(31, 41, 55, .03);
      transition: background .16s ease, border-color .16s ease, box-shadow .16s ease, color .16s ease;
    }
    .btn:hover { background: #f8fbff; border-color: #b9c8dc; box-shadow: 0 4px 12px rgba(31, 41, 55, .06); }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 8px 16px rgba(52,120,246,.18); }
    .btn.primary:hover { background: var(--primary-strong); }
    .btn.danger { color: var(--red); border-color: #e4c2bf; background: var(--red-soft); }
    .btn.success { color: var(--green); border-color: #bfe0cd; background: var(--green-soft); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 30px; padding: 0 10px; font-size: 12px; }
    .icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--line-strong); border-radius: 9px; background: #fff; color: var(--text);
      display: inline-grid; place-items: center;
      box-shadow: 0 1px 2px rgba(31,41,55,.03);
    }
    .icon-btn:hover { background: var(--soft); }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(31, 41, 55, .04);
    }
    .panel-head {
      min-height: 54px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-head h2 { font-size: 15px; font-weight: 850; }
    .panel-head span, .muted { color: var(--muted); }
    .panel-body { padding: 18px; }
    .panel-body.tight { padding: 0; }
    .grid-2 { display: grid; grid-template-columns: 1.15fr .85fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }
    .grid-6 { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 10px; }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      min-height: 98px;
      padding: 14px;
      display: grid;
      gap: 8px;
      align-content: space-between;
      text-align: left;
      box-shadow: 0 6px 18px rgba(31,41,55,.035);
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    button.metric:hover { border-color: #bcd0ea; background: #fbfdff; box-shadow: 0 10px 24px rgba(52,120,246,.08); transform: translateY(-1px); }
    .metric label { color: var(--muted); font-weight: 800; display: flex; justify-content: space-between; gap: 8px; }
    .metric strong { font-size: 24px; line-height: 1; font-weight: 850; }
    .metric small { color: var(--muted); line-height: 1.45; }

    .analysis-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .analysis-grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .analysis-grid.four { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .chart-card {
      min-height: 248px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(31,41,55,.04);
      display: grid;
      grid-template-rows: auto minmax(0,1fr);
    }
    .chart-card.wide { grid-column: span 2; }
    .chart-head {
      min-height: 58px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .chart-head h2 { font-size: 14px; font-weight: 900; }
    .chart-head span { display: block; margin-top: 4px; color: var(--muted); line-height: 1.4; font-size: 12px; }
    .chart-body { padding: 14px; display: grid; gap: 12px; align-content: stretch; min-width: 0; }
    .icon-btn.small { width: 30px; height: 30px; border-radius: 8px; }
    .line-chart { width: 100%; height: 150px; display: block; overflow: visible; }
    .line-chart .grid-line { stroke: #e8eef6; stroke-width: 1; }
    .line-chart .area { fill: rgba(52,120,246,.10); }
    .line-chart .line { fill: none; stroke: var(--primary); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .line-chart .line.alt { stroke: var(--green); }
    .line-chart .point { fill: #fff; stroke: var(--primary); stroke-width: 2; }
    .chart-axis { display: grid; grid-template-columns: repeat(var(--cols, 6), minmax(0,1fr)); gap: 4px; color: var(--subtle); font-size: 11px; text-align: center; }
    .bar-list, .funnel-list { display: grid; gap: 10px; }
    .bar-row, .funnel-row {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 0;
      display: grid;
      grid-template-columns: 96px minmax(0,1fr) 44px;
      align-items: center;
      gap: 10px;
      text-align: left;
      color: var(--text);
    }
    .bar-name, .funnel-name { color: var(--muted); font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track, .funnel-track { height: 10px; border-radius: 999px; background: #eef2f7; overflow: hidden; }
    .bar-track i, .funnel-track i { display: block; width: var(--w); height: 100%; border-radius: inherit; background: var(--c, var(--primary)); }
    .bar-row strong, .funnel-row strong { text-align: right; font-weight: 900; }
    .column-chart {
      height: 154px;
      display: grid;
      grid-template-columns: repeat(var(--cols, 6), minmax(0,1fr));
      align-items: end;
      gap: 8px;
      padding-top: 6px;
      border-bottom: 1px solid var(--line);
    }
    .column {
      height: 100%;
      min-width: 0;
      border: 0;
      background: transparent;
      display: grid;
      align-items: end;
      justify-items: center;
      padding: 0;
      color: var(--text);
    }
    .column i {
      width: 100%;
      min-height: 8px;
      height: var(--h);
      border-radius: 8px 8px 0 0;
      background: linear-gradient(180deg, var(--c, var(--primary)), rgba(52,120,246,.50));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
    }
    .donut-wrap { display: grid; grid-template-columns: 132px minmax(0,1fr); gap: 14px; align-items: center; }
    .donut {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      background: conic-gradient(var(--segments));
      box-shadow: inset 0 0 0 1px var(--line);
    }
    .donut::after { content: ""; position: absolute; width: 78px; height: 78px; border-radius: 50%; background: #fff; box-shadow: inset 0 0 0 1px var(--line); }
    .donut strong { position: relative; z-index: 1; font-size: 20px; }
    .legend { display: grid; gap: 8px; }
    .legend-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--muted); line-height: 1.35; }
    .legend-row span:first-child { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
    .legend-dot { width: 9px; height: 9px; border-radius: 2px; background: var(--c); flex: 0 0 9px; }
    .matrix {
      min-height: 158px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }
    .matrix-cell {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      padding: 10px;
      display: grid;
      gap: 6px;
      align-content: space-between;
    }
    .matrix-cell strong { font-size: 17px; }
    .matrix-cell span { color: var(--muted); line-height: 1.35; }
    .insight-list { display: grid; gap: 9px; }
    .insight {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      padding: 10px;
      display: grid;
      gap: 5px;
    }
    .insight strong { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .insight span { color: var(--muted); line-height: 1.42; }
    .sparkline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: center; }
    .mini-kpis { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
    .mini-kpi { border: 1px solid var(--line); border-radius: 10px; background: #f8fbff; padding: 10px; display: grid; gap: 4px; }
    .mini-kpi label { color: var(--muted); font-size: 12px; font-weight: 850; }
    .mini-kpi strong { font-size: 17px; }
    .status {
      min-height: 24px;
      border-radius: 6px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status.green { color: var(--green); background: var(--green-soft); border: 1px solid #c9ecdc; }
    .status.amber { color: var(--amber); background: var(--amber-soft); border: 1px solid #ffe4ba; }
    .status.red { color: var(--red); background: var(--red-soft); border: 1px solid #ffd0cc; }
    .status.blue { color: var(--blue); background: var(--blue-soft); border: 1px solid #cfe0ff; }
    .status.violet { color: var(--violet); background: var(--violet-soft); border: 1px solid #ded7ff; }
    .status.gray { color: var(--muted); background: #eef2f6; }

    .goal-layout { display: grid; grid-template-columns: minmax(0, 1fr) 260px; gap: 12px; }
    .goal-box {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .goal-box textarea { min-height: 70px; border: 0; outline: 0; resize: vertical; line-height: 1.55; color: var(--text); }
    .chip-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .chip {
      min-height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 760;
      white-space: nowrap;
    }
    button.chip:hover, .chip.active { color: var(--primary); background: var(--primary-soft); border-color: #a9c7ff; }
    .ai-side {
      border: 1px solid #cfe0ff;
      border-radius: 12px;
      background: linear-gradient(180deg, #f7fbff, #eef5ff);
      padding: 14px;
      display: grid;
      gap: 8px;
      align-content: center;
    }
    .ai-side strong { font-size: 24px; line-height: 1; color: var(--primary-strong); }
    .ai-side span { color: #50627a; line-height: 1.5; }

    .card-list { display: grid; gap: 10px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 10px;
      text-align: left;
      box-shadow: 0 4px 14px rgba(31,41,55,.025);
    }
    button.card:hover { border-color: #bfd2eb; background: #fbfdff; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-title { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .card-title strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta { color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; line-height: 1.45; }
    .thumb {
      width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--line); flex: 0 0 42px;
      background: linear-gradient(135deg, #fff 0 55%, #eef5ff 56%);
      position: relative; overflow: hidden;
    }
    .thumb::after {
      content: "";
      position: absolute;
      left: 12px; top: 10px; width: 18px; height: 18px;
      border: 4px solid #8bb6ff; border-radius: 6px; transform: rotate(-7deg);
    }
    .thumb.beauty::after { border-radius: 50%; border-color: #b99bc8; }
    .thumb.storage::after { border-radius: 3px; border-color: #c2a36d; }
    .progress { width: 100%; height: 7px; border-radius: 999px; background: #edf1f5; overflow: hidden; }
    .progress span { display: block; height: 100%; width: var(--value, 50%); background: var(--primary); }
    .stepper { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; }
    .step { border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 10px; min-height: 70px; box-shadow: 0 4px 14px rgba(31,41,55,.03); }
    .step.done { border-color: #bfe8d2; background: var(--green-soft); }
    .step.active { border-color: #a9c7ff; background: var(--primary-soft); }
    .step strong { display: block; margin-bottom: 5px; }
    .step span { color: var(--muted); font-size: 12px; line-height: 1.35; }

    .tabs { display: flex; align-items: center; gap: 6px; overflow: auto; }
    .tab {
      min-height: 32px; border: 1px solid transparent; border-radius: 999px; padding: 0 14px;
      background: transparent; color: var(--muted); font-weight: 800; white-space: nowrap;
    }
    .tab:hover, .tab.active { color: var(--primary); background: #fff; border-color: #b9d1ff; box-shadow: 0 2px 8px rgba(52,120,246,.12); }
    .filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .field {
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
    }
    .field label {
      height: 100%;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      color: var(--muted);
      background: #f9fbfd;
      border-right: 1px solid var(--line);
      font-weight: 850;
      white-space: nowrap;
    }
    .field input, .field select { height: 100%; border: 0; outline: 0; padding: 0 10px; background: transparent; color: var(--text); min-width: 120px; }

    .table-wrap { border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: auto; box-shadow: 0 6px 18px rgba(31,41,55,.035); }
    table { width: 100%; min-width: 980px; border-collapse: collapse; }
    th, td { padding: 13px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; line-height: 1.45; }
    th { background: #fbfcfe; color: #536178; font-size: 12px; font-weight: 850; white-space: nowrap; }
    tbody tr:hover { background: #f8fbff; }
    tr:last-child td { border-bottom: 0; }
    .layout-detail { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
    .detail-panel { position: sticky; top: 78px; border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: hidden; box-shadow: 0 8px 22px rgba(31,41,55,.045); }
    .detail-section { padding: 16px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; }
    .detail-section:last-child { border-bottom: 0; }
    .kv { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .kv-item { border: 1px solid var(--line); border-radius: 10px; background: #f8fbff; padding: 11px; min-height: 64px; }
    .kv-item label { display: block; color: var(--muted); font-size: 12px; font-weight: 850; margin-bottom: 5px; }
    .kv-item strong { font-size: 16px; }
    .reason-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .reason-list li { display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }

    function lineChart(values, labels, opts = {}) {
      const width = 360;
      const height = 138;
      const pad = 10;
      const max = Math.max(...values, 1);
      const min = Math.min(...values, 0);
      const range = max - min || 1;
      const points = values.map((value, index) => {
        const x = pad + (index * (width - pad * 2)) / Math.max(values.length - 1, 1);
        const y = height - pad - ((value - min) / range) * (height - pad * 2);
        return [Number(x.toFixed(1)), Number(y.toFixed(1))];
      });
      const path = points.map(point => point.join(",")).join(" ");
      const area = `${points[0][0]},${height - pad} ${path} ${points.at(-1)[0]},${height - pad}`;
      return `
        <svg class="line-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
          <line class="grid-line" x1="0" y1="${height - pad}" x2="${width}" y2="${height - pad}"></line>
          <line class="grid-line" x1="0" y1="${height / 2}" x2="${width}" y2="${height / 2}"></line>
          <line class="grid-line" x1="0" y1="${pad}" x2="${width}" y2="${pad}"></line>
          <polygon class="area" points="${area}"></polygon>
          <polyline class="line ${opts.alt ? "alt" : ""}" points="${path}"></polyline>
          ${points.map(([x,y]) => `<circle class="point" cx="${x}" cy="${y}" r="3.5"></circle>`).join("")}
        </svg>
        <div class="chart-axis" style="--cols:${labels.length}">${labels.map(label => `<span>${escapeHtml(label)}</span>`).join("")}</div>
      `;
    }

    function donutChart(items, center) {
      const total = items.reduce((sum, item) => sum + numeric(item.value), 0) || 1;

      const segments = items.map((item, index) => {
        const start = cursor;
        cursor += numeric(item.value) / total * 360;
        return `${item.color || chartColors[index % chartColors.length]} ${start.toFixed(1)}deg ${cursor.toFixed(1)}deg`;

      return `
        <div class="donut-wrap">

    function table(columns, rows, rowAction = "openRow") {
      return `<div class="table-wrap"><table><thead><tr>${columns.map(col => `<th>${escapeHtml(col.label)}</th>`).join("")}<th>操作</th></tr></thead><tbody>
        ${rows.map(row => `<tr>${columns.map(col => `<td>${cell(row, col)}</td>`).join("")}<td><div class="actions"><button class="btn small" data-action="${rowAction}" data-id="${row.id}">详情</button>${row.quick || ""}</div></td></tr>`).join("") || `<tr><td colspan="${columns.length + 1}"><div class="empty">暂无数据</div></td></tr>`}
      </tbody></table></div>`;
    }

    function cell(row, col) {
      const value = row[col.key];
      if (col.kind === "status") return status(value);
      if (col.kind === "progress") return `<div class="progress" style="--value:${escapeHtml(value)}"><span></span></div><div class="meta">${escapeHtml(value)}</div>`;
      if (col.kind === "product") {
        const product = products.find(item => item.id === row.sku) || products[0];
        return `<div class="card-title"><div class="thumb ${product?.thumb || ""}"></div><div><strong>${escapeHtml(value || row.product || row.name || row.sku)}</strong><div class="meta">${escapeHtml(row.sku || "")} ${row.asin ? "· " + escapeHtml(row.asin) : ""}</div></div></div>`;
      }
      if (col.kind === "priority") return status(value);
      return escapeHtml(value ?? "");
    }

      if (row.status && /待|中|缺失|风险/.test(row.status)) {

    function openModal(title, body, foot) {
      qs("#modalTitle").textContent = title;

      qs("#modalMask").classList.add("open");
      qs("#modal").classList.add("open");
      iconRefresh();
    }

    function closeModal() {
      qs("#modalMask").classList.remove("open");
      qs("#modal").classList.remove("open");
    }

      qs("#drawerTitle").textContent = title;
      qs("#drawerBody").innerHTML = body;
      qs("#drawerFoot").innerHTML = foot || `<button class="btn primary" data-action="closeDrawer">关闭</button>`;
      qs("#drawerMask").classList.add("open");
      qs("#drawer").classList.add("open");
      iconRefresh();

      qs("#drawerMask").classList.remove("open");

      qs("#toastStack").appendChild(node);
      setTimeout(() => node.remove(), 3600);

      openSku360(el){

        openDrawer(`${product.name} · 商品 360`, product360Detail(product), `<button class="btn" data-view="profit">利润驾驶舱</button><button class="btn" data-view="voice">评论退货</button><button class="btn primary" data-action="addLogFor" data-id="${product.id}">记录动作</button>`);
      },
      syncVoice(){ toast("评论退货已同步", "评论、退货、客服和竞品差评已归因到 SKU。"); },
      voiceToRule(){ rules.unshift({id:`RULE-${Date.now()}`, name:"评论退货反馈规则", type:"质量回流规则", scope:"Amazon / 全站点", condition:"VOC 问题频次或退货率超红线", action:"触发 Brief / 图片 / Listing / 供应链复核", risk:"中", enabled:false, updated:"刚刚"}); setView("rules"); toast("已转规则建议", "VOC 问题已进入规则中心待审核。"); },
      generateProfitActions(){ reviews.unshift({id:`REV-${Date.now()}`, type:"利润处置审核", sku:"YL-ADS-091", product:"家居收纳套装", task:"利润驾驶舱", conclusion:"建议收缩广告并暂停补货", evidence:"净利为负，TACoS 28%，库存覆盖 18 天", risk:"高", status:"待审核", due:"今天", owner:"运营主管"}); setView("reviews"); toast("利润动作已生成", "高风险动作已进入审核中心。"); },
      openCostRules(){ setView("costRules"); },
      syncCompetitorPrice(){ toast("竞品价格已同步", "已更新价格带、Coupon、Deal 和清货价建议。"); },
      submitPriceReview(){ reviews.unshift({id:`REV-${Date.now()}`, type:"调价策略审核", sku:"YL-HOM-033", product:"桌面线缆收纳盒", task:"价格与促销策略", conclusion:"建议降价 10%-20%，配合停低效广告", evidence:"当前价格偏高，D15 转化弱，广告接近止损线", risk:"中", status:"待审核", due:"今天", owner:"运营主管"}); setView("reviews"); toast("调价建议已提交", "调价、Coupon 或 Deal 将走人工审核。"); },
      importFailureReason(){ toast("失败原因已导入", "可从清货复盘、不动销处置和选品淘汰自动导入。"); },
      failureToRule(){ rules.unshift({id:`RULE-${Date.now()}`, name:"失败原因回流规则", type:"选品规则", scope:"Amazon / UK", condition:"命中历史失败根因组合", action:"降低推荐权重或转人工复核", risk:"中", enabled:false, updated:"刚刚"}); setView("rules"); toast("失败原因已转规则", "已生成待审核规则建议。"); },
      testCostRules(){ toast("利润试算完成", "已按采购、头程、FBA、广告、退款、仓储和汇率口径重算。"); },
      saveCostRules(){ toast("成本口径已保存", "利润驾驶舱、补货决策和清货止损线将使用新口径。"); },
      openChartInsight(el){
        openModal(el.dataset.title || "分析看板说明", `
          <div class="card"><strong>分析口径</strong><div class="meta">${escapeHtml(el.dataset.insight || "该图表基于当前原型中的任务、商品、审核、异常、广告、库存和质量回流数据生成。")}</div></div>
          <div class="grid-3">
            <div class="kv-item"><label>数据来源</label><strong>ERP / Ads / 1688 / 审核</strong></div>
            <div class="kv-item"><label>刷新方式</label><strong>点击同步</strong></div>
            <div class="kv-item"><label>交互方式</label><strong>图表项可跳转</strong></div>
          </div>
          <div class="card"><strong>产品含义</strong><div class="meta">看板用于让运营先看趋势和结构，再进入表格处理具体对象，最后把动作写入日志和质量反馈。</div></div>
        `, `<button class="btn primary" data-action="closeModal">知道了</button>`);
      },
      searchOpen(el){ closeModal(); openDetailForAny(el.dataset.id); },
      syncData(){ toast("数据已同步", "ERP、广告、库存、采购、Listing 和生命周期主表已刷新。"); }
    };

    function openSearch() {
      const query = qs("#globalSearch").value.trim();
      const rows = [...tasks.map(x=>({id:x.id,type:"任务",title:x.name})), ...products.map(x=>({id:x.id,type:"商品",title:`${x.id} ${x.name}`})), ...opportunitySignals.map(x=>({id:x.id,type:"机会信号",title:`${x.direction} ${x.keyword}`})), ...opportunities.map(x=>({id:x.id,type:"机会池",title:`${x.product} ${x.keyword}`})), ...complianceRows.map(x=>({id:x.id,type:"合规风控",title:`${x.sku} ${x.product} ${x.risk}`})), ...profitRows.map(x=>({id:x.id,type:"利润",title:`${x.sku} ${x.profitStatus}`})), ...voiceRows.map(x=>({id:x.id,type:"评论退货",title:`${x.sku} ${x.issue}`})), ...failureReasons.map(x=>({id:x.id,type:"失败原因",title:`${x.sku} ${x.reason}`})), ...exceptions.map(x=>({id:x.id,type:"异常",title:`${x.type} ${x.sku}`})), ...library.map(x=>({id:x.id,type:"成果",title:x.title}))];
      const matched = rows.filter(row => !query || row.title.toLowerCase().includes(query.toLowerCase()) || row.type.includes(query)).slice(0,8);
      openModal("全局搜索", `
        <div class="field" style="width:100%"><label>搜索</label><input id="modalSearchInput" value="${escapeHtml(query)}" placeholder="任务、SKU、ASIN、异常、成果"></div>
        <div class="card-list" id="modalSearchResults">${matched.map(row=>`<button class="card" data-action="searchOpen" data-id="${row.id}"><div class="card-top"><div><strong>${escapeHtml(row.title)}</strong><div class="meta">${row.type}</div></div><i data-lucide="arrow-right"></i></div></button>`).join("") || `<div class="empty">没有搜索结果</div>`}</div>
      `, `<button class="btn primary" data-action="closeModal">关闭</button>`);
    }

    function openNotifications() {
      openDrawer("通知中心", `
        <div class="card-list">
          <div class="card"><div class="card-top"><strong>P0 异常：D15 弱动销</strong>${status("P0")}</div><div class="meta">YL-HOM-033 需要今天处理。</div><button class="btn small" data-view="exceptions">去处理</button></div>
          <div class="card"><div class="card-top"><strong>审核任务：图片审核</strong>${status("待审核")}</div><div class="meta">硅胶沥水篮 5 张图片等待确认。</div><button class="btn small" data-view="reviews">去审核</button></div>
          <div class="card"><div class="card-top"><strong>积分提醒</strong>${status("正常")}</div><div class="meta">今日消耗 392，剩余 12,480。</div><button class="btn small" data-view="credits">查看积分</button></div>
        </div>
      `);
    }

    document.addEventListener("click", event => {
      const view = event.target.closest("[data-view]");
      if (view) {
        event.preventDefault();
        closeDrawer();
        closeModal();
        setView(view.dataset.view);
        return;
      }
      const action = event.target.closest("[data-action]");
      if (!action) return;
      event.preventDefault();
      const handler = handlers[action.dataset.action];
      if (handler) handler(action);
    });

    document.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") { event.preventDefault(); openSearch(); }
      if (event.key === "Enter" && document.activeElement?.id === "globalSearch") openSearch();
      if (event.key === "Escape") { closeModal(); closeDrawer(); }
    });

    render();
  </script>
</body>
</html>
