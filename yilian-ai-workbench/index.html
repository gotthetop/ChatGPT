<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>羿链 AI 工作台 - 全生命周期完整原型</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #fff;
      --soft: #f7f9fc;
      --soft-2: #eef4ff;
      --line: #e7edf4;
      --line-strong: #d8e2ee;
      --text: #1f2937;
      --muted: #6b778c;
      --subtle: #a6b0bf;
      --primary: #3478f6;
      --primary-strong: #2368e8;
      --primary-soft: #eef5ff;
      --blue: #3478f6;
      --blue-soft: #eef5ff;
      --green: #13966a;
      --green-soft: #eaf8f2;
      --amber: #d97706;
      --amber-soft: #fff7e8;
      --red: #dc4c45;
      --red-soft: #fff1f0;
      --violet: #6b59b5;
      --violet-soft: #f1eeff;
      --shadow: 0 10px 30px rgba(31, 41, 55, .08);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 1220px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 228px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: #f7f9fd;
      color: #4f5f75;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 20;
      border-right: 1px solid var(--line);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: block;
      background: linear-gradient(135deg, #22d3ee 0 48%, transparent 49%),
        linear-gradient(315deg, #5b7cfa 0 44%, transparent 45%),
        #12c7b7;
      color: transparent;
      font-size: 0;
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      right: -2px;
      bottom: -2px;
      border-radius: 2px;
      background: #5b7cfa;
      border: 2px solid #f7f9fd;
    }
    .brand strong { display: block; color: #1f2937; font-size: 15px; font-weight: 900; }
    .brand span { display: block; margin-top: 3px; color: #9aa5b5; font-size: 12px; }
    .nav {
      overflow: auto;
      padding-right: 2px;
      display: grid;
      gap: 12px;
    }
    .nav-group-title {
      margin: 10px 0 4px;
      color: #9aa5b5;
      font-size: 12px;
      font-weight: 700;
    }
    .nav-btn {
      width: 100%;
      min-height: 36px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #5f6f86;
      padding: 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      white-space: nowrap;
      font-weight: 700;
    }
    .nav-btn svg, .btn svg, .icon-btn svg { width: 16px; height: 16px; flex: 0 0 16px; }
    .nav-btn:hover { background: #eef3fb; color: var(--primary); }
    .nav-btn.active { background: #eaf2ff; color: var(--primary); }
    .nav-btn.active svg { color: var(--primary); }
    .side-status {
      margin-top: auto;
      border: 1px solid #dce8ff;
      border-radius: 8px;
      background: #f0f6ff;
      padding: 12px;
      display: grid;
      gap: 7px;
    }
    .side-status strong { color: #1f2937; }
    .side-status p { margin: 0; color: #6b778c; line-height: 1.5; font-size: 12px; }

    .workspace { min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      min-height: 58px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .top-left, .top-right, .row, .actions { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .select, .input, .textarea {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: 0;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .select:focus, .input:focus, .textarea:focus, .search:focus-within, .field:focus-within {
      border-color: #9fc0ff;
      box-shadow: 0 0 0 3px rgba(52, 120, 246, .12);
    }
    .select { height: 36px; padding: 0 12px; }
    .input { height: 36px; padding: 0 12px; }
    .textarea { width: 100%; min-height: 84px; padding: 10px 12px; line-height: 1.55; resize: vertical; }
    .search {
      width: min(360px, 30vw);
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      color: var(--muted);
    }
    .search input { border: 0; outline: 0; width: 100%; background: transparent; color: var(--text); }
    .main { padding: 20px 24px 36px; display: grid; gap: 16px; }
    .page-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    h1 { margin: 0; font-size: 20px; line-height: 1.22; letter-spacing: 0; font-weight: 850; }
    h2, h3 { margin: 0; letter-spacing: 0; }
    .page-desc { margin: 6px 0 0; color: var(--muted); line-height: 1.55; }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 750;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(31, 41, 55, .03);
      transition: background .16s ease, border-color .16s ease, box-shadow .16s ease, color .16s ease;
    }
    .btn:hover { background: #f8fbff; border-color: #b9c8dc; box-shadow: 0 4px 12px rgba(31, 41, 55, .06); }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 8px 16px rgba(52,120,246,.18); }
    .btn.primary:hover { background: var(--primary-strong); }
    .btn.danger { color: var(--red); border-color: #e4c2bf; background: var(--red-soft); }
    .btn.success { color: var(--green); border-color: #bfe0cd; background: var(--green-soft); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 30px; padding: 0 10px; font-size: 12px; }
    .icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--line-strong); border-radius: 9px; background: #fff; color: var(--text);
      display: inline-grid; place-items: center;
      box-shadow: 0 1px 2px rgba(31,41,55,.03);
    }
    .icon-btn:hover { background: var(--soft); }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(31, 41, 55, .04);
    }
    .panel-head {
      min-height: 54px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-head h2 { font-size: 15px; font-weight: 850; }
    .panel-head span, .muted { color: var(--muted); }
    .panel-body { padding: 18px; }
    .panel-body.tight { padding: 0; }
    .grid-2 { display: grid; grid-template-columns: 1.15fr .85fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }
    .grid-6 { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 10px; }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      min-height: 98px;
      padding: 14px;
      display: grid;
      gap: 8px;
      align-content: space-between;
      text-align: left;
      box-shadow: 0 6px 18px rgba(31,41,55,.035);
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    button.metric:hover { border-color: #bcd0ea; background: #fbfdff; box-shadow: 0 10px 24px rgba(52,120,246,.08); transform: translateY(-1px); }
    .metric label { color: var(--muted); font-weight: 800; display: flex; justify-content: space-between; gap: 8px; }
    .metric strong { font-size: 24px; line-height: 1; font-weight: 850; }
    .metric small { color: var(--muted); line-height: 1.45; }
    .status {
      min-height: 24px;
      border-radius: 6px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status.green { color: var(--green); background: var(--green-soft); border: 1px solid #c9ecdc; }
    .status.amber { color: var(--amber); background: var(--amber-soft); border: 1px solid #ffe4ba; }
    .status.red { color: var(--red); background: var(--red-soft); border: 1px solid #ffd0cc; }
    .status.blue { color: var(--blue); background: var(--blue-soft); border: 1px solid #cfe0ff; }
    .status.violet { color: var(--violet); background: var(--violet-soft); border: 1px solid #ded7ff; }
    .status.gray { color: var(--muted); background: #eef2f6; }

    .goal-layout { display: grid; grid-template-columns: minmax(0, 1fr) 260px; gap: 12px; }
    .goal-box {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .goal-box textarea { min-height: 70px; border: 0; outline: 0; resize: vertical; line-height: 1.55; color: var(--text); }
    .chip-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .chip {
      min-height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 760;
      white-space: nowrap;
    }
    button.chip:hover, .chip.active { color: var(--primary); background: var(--primary-soft); border-color: #a9c7ff; }
    .ai-side {
      border: 1px solid #cfe0ff;
      border-radius: 12px;
      background: linear-gradient(180deg, #f7fbff, #eef5ff);
      padding: 14px;
      display: grid;
      gap: 8px;
      align-content: center;
    }
    .ai-side strong { font-size: 24px; line-height: 1; color: var(--primary-strong); }
    .ai-side span { color: #50627a; line-height: 1.5; }

    .card-list { display: grid; gap: 10px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 10px;
      text-align: left;
      box-shadow: 0 4px 14px rgba(31,41,55,.025);
    }
    button.card:hover { border-color: #bfd2eb; background: #fbfdff; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-title { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .card-title strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta { color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; line-height: 1.45; }
    .thumb {
      width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--line); flex: 0 0 42px;
      background: linear-gradient(135deg, #fff 0 55%, #eef5ff 56%);
      position: relative; overflow: hidden;
    }
    .thumb::after {
      content: "";
      position: absolute;
      left: 12px; top: 10px; width: 18px; height: 18px;
      border: 4px solid #8bb6ff; border-radius: 6px; transform: rotate(-7deg);
    }
    .thumb.beauty::after { border-radius: 50%; border-color: #b99bc8; }
    .thumb.storage::after { border-radius: 3px; border-color: #c2a36d; }
    .progress { width: 100%; height: 7px; border-radius: 999px; background: #edf1f5; overflow: hidden; }
    .progress span { display: block; height: 100%; width: var(--value, 50%); background: var(--primary); }
    .stepper { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; }
    .step { border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 10px; min-height: 70px; box-shadow: 0 4px 14px rgba(31,41,55,.03); }
    .step.done { border-color: #bfe8d2; background: var(--green-soft); }
    .step.active { border-color: #a9c7ff; background: var(--primary-soft); }
    .step strong { display: block; margin-bottom: 5px; }
    .step span { color: var(--muted); font-size: 12px; line-height: 1.35; }

    .tabs { display: flex; align-items: center; gap: 6px; overflow: auto; }
    .tab {
      min-height: 32px; border: 1px solid transparent; border-radius: 999px; padding: 0 14px;
      background: transparent; color: var(--muted); font-weight: 800; white-space: nowrap;
    }
    .tab:hover, .tab.active { color: var(--primary); background: #fff; border-color: #b9d1ff; box-shadow: 0 2px 8px rgba(52,120,246,.12); }
    .filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .field {
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
    }
    .field label {
      height: 100%;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      color: var(--muted);
      background: #f9fbfd;
      border-right: 1px solid var(--line);
      font-weight: 850;
      white-space: nowrap;
    }
    .field input, .field select { height: 100%; border: 0; outline: 0; padding: 0 10px; background: transparent; color: var(--text); min-width: 120px; }

    .table-wrap { border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: auto; box-shadow: 0 6px 18px rgba(31,41,55,.035); }
    table { width: 100%; min-width: 980px; border-collapse: collapse; }
    th, td { padding: 13px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; line-height: 1.45; }
    th { background: #fbfcfe; color: #536178; font-size: 12px; font-weight: 850; white-space: nowrap; }
    tbody tr:hover { background: #f8fbff; }
    tr:last-child td { border-bottom: 0; }
    .layout-detail { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
    .detail-panel { position: sticky; top: 78px; border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: hidden; box-shadow: 0 8px 22px rgba(31,41,55,.045); }
    .detail-section { padding: 16px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; }
    .detail-section:last-child { border-bottom: 0; }
    .kv { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .kv-item { border: 1px solid var(--line); border-radius: 10px; background: #f8fbff; padding: 11px; min-height: 64px; }
    .kv-item label { display: block; color: var(--muted); font-size: 12px; font-weight: 850; margin-bottom: 5px; }
    .kv-item strong { font-size: 16px; }
    .reason-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .reason-list li { display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff8a1f; flex: 0 0 7px; margin-top: 7px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .form-row { display: grid; gap: 6px; }
    .form-row.full { grid-column: 1 / -1; }
    .form-row label { color: var(--muted); font-weight: 850; font-size: 12px; }
    .asset-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; }
    .asset-card { border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: hidden; display: grid; text-align: left; box-shadow: 0 6px 16px rgba(31,41,55,.035); }
    .asset-card.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(52,120,246,.14), 0 8px 18px rgba(31,41,55,.05); }
    .asset-preview { aspect-ratio: 1 / .78; background: linear-gradient(180deg, #fbfdff, #edf4ff); position: relative; border-bottom: 1px solid var(--line); }
    .asset-preview::before { content: ""; position: absolute; width: 40%; height: 38%; left: 30%; top: 28%; border: 8px solid #8bb6ff; border-radius: 8px; transform: rotate(-7deg); background: rgba(255,255,255,.72); }
    .asset-preview.scene::before { border-radius: 50% 50% 12px 12px; border-color: #a69ac4; }
    .asset-preview.info::before { border-radius: 4px; border-color: #c0a05d; }
    .asset-card footer { padding: 10px; display: grid; gap: 7px; }
    .timeline { display: grid; gap: 0; }
    .timeline-row { position: relative; display: grid; grid-template-columns: 28px minmax(0,1fr); gap: 10px; padding-bottom: 14px; }
    .timeline-row::after { content: ""; position: absolute; left: 13px; top: 26px; bottom: 0; width: 1px; background: var(--line-strong); }
    .timeline-row:last-child { padding-bottom: 0; }
    .timeline-row:last-child::after { display: none; }
    .timeline-dot { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; background: var(--primary-soft); color: var(--primary); border: 1px solid #b9d1ff; font-weight: 900; z-index: 1; }
    .timeline-content { border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 11px; display: grid; gap: 6px; }
    .switch { position: relative; width: 44px; height: 24px; flex: 0 0 44px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 999px; transition: .2s; }
    .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; box-shadow: 0 1px 4px rgba(0,0,0,.18); }
    .switch input:checked + .slider { background: var(--primary); }
    .switch input:checked + .slider::before { transform: translateX(20px); }

    .drawer-mask, .modal-mask { position: fixed; inset: 0; background: rgba(15,23,42,.42); z-index: 40; display: none; backdrop-filter: blur(1px); }
    .drawer-mask.open, .modal-mask.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; width: min(820px, 92vw); height: 100vh; background: #fff; z-index: 45;
      box-shadow: var(--shadow); transform: translateX(102%); transition: transform .22s ease; display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head, .modal-head { min-height: 64px; padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .drawer-head h2, .modal-head h2 { font-size: 17px; font-weight: 900; }
    .drawer-body, .modal-body { padding: 22px 24px; overflow: auto; display: grid; gap: 14px; background: #fbfcfe; }
    .drawer-foot, .modal-foot { margin-top: auto; padding: 14px 24px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; background: #fff; }
    .modal {
      position: fixed; top: 50%; left: 50%; width: min(780px, calc(100vw - 36px)); max-height: calc(100vh - 48px); z-index: 50;
      border-radius: 12px; background: #fff; box-shadow: var(--shadow); transform: translate(-50%, -48%) scale(.98);
      opacity: 0; pointer-events: none; transition: .18s ease; display: flex; flex-direction: column; overflow: hidden;
    }
    .modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
    .toast-stack { position: fixed; right: 18px; bottom: 18px; z-index: 70; width: min(390px, calc(100vw - 36px)); display: grid; gap: 10px; }
    .toast { border: 1px solid var(--line-strong); border-left: 4px solid var(--primary); border-radius: 10px; background: #fff; box-shadow: 0 12px 30px rgba(15,23,42,.12); padding: 12px; display: grid; gap: 4px; }
    .toast span { color: var(--muted); line-height: 1.45; }
    .empty { min-height: 160px; display: grid; place-items: center; text-align: center; color: var(--muted); padding: 24px; }

    @media (max-width: 980px) {
      body { min-width: 0; }
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .nav { display: flex; overflow-x: auto; }
      .nav-group-title, .side-status { display: none; }
      .nav-btn { width: auto; flex: 0 0 auto; }
      .topbar { position: relative; flex-wrap: wrap; padding: 12px; }
      .main { padding: 14px; }
      .grid-2, .grid-3, .grid-4, .grid-5, .grid-6, .goal-layout, .layout-detail, .form-grid { grid-template-columns: 1fr; }
      .asset-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .detail-panel { position: static; }
      .search { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">羿</div>

    function moduleTable(title, desc, rows, columns, actions) {
      return `
        ${pageShell(title, desc, actions)}

    function genericQuick(row) {
      if (row.status && /待|中|缺失|风险/.test(row.status)) {
        return `<button class="btn small success" data-action="markDone" data-id="${row.id}">完成</button><button class="btn small" data-action="addLogFor" data-id="${row.id}">记日志</button>`;
      }
      return `<button class="btn small" data-action="addLogFor" data-id="${row.id}">记日志</button>`;
    }

    function openModal(title, body, foot) {
      qs("#modalTitle").textContent = title;
      qs("#modalBody").innerHTML = body;
      qs("#modalFoot").innerHTML = foot || `<button class="btn primary" data-action="closeModal">知道了</button>`;
      qs("#modalMask").classList.add("open");
      qs("#modal").classList.add("open");
      iconRefresh();
    }

    function closeModal() {
      qs("#modalMask").classList.remove("open");
      qs("#modal").classList.remove("open");
    }

    function openDrawer(title, body, foot) {
      qs("#drawerTitle").textContent = title;
      qs("#drawerBody").innerHTML = body;
      qs("#drawerFoot").innerHTML = foot || `<button class="btn primary" data-action="closeDrawer">关闭</button>`;
      qs("#drawerMask").classList.add("open");
      qs("#drawer").classList.add("open");
      iconRefresh();
    }

    function closeDrawer() {
      qs("#drawerMask").classList.remove("open");
      qs("#drawer").classList.remove("open");
    }

    function toast(title, msg) {
      const node = document.createElement("div");
      node.className = "toast";
      node.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(msg)}</span>`;
      qs("#toastStack").appendChild(node);
      setTimeout(() => node.remove(), 3600);
    }

    function setView(view) {
      state.view = view;
      state.filter = "all";
      render();
      window.scrollTo({top: 0, behavior: "smooth"});

    function openDetailForAny(id) {
      const pools = [tasks, reviews, opportunities, briefs, supply, contentAssets, drafts, newProducts, healthRows, adRows, replenishment, clearance, exceptions, inactive, logs, rules, quality.map((q,i)=>({...q,id:`QLT-${i+1}`})), library, credits];

      openDrawer(row.name || row.product || row.title || row.type || row.id, `
        <div class="kv">${entries.slice(0,8).map(([k,v])=>`<div class="kv-item"><label>${escapeHtml(k)}</label><strong>${escapeHtml(v)}</strong></div>`).join("")}</div>

    function approveReview(id) {
      const row = reviews.find(item => item.id === id);
      if (row) row.status = "通过";
      logs.unshift({ id:`LOG-${Date.now()}`, related:id, sku:row?.sku || "", asin:"", type:"审核通过", content:`${row?.type || "审核"} 已通过，触发下一步流程`, user:"运营主管", time:"刚刚", before:"待审核", after:"通过", review:"--", result:"有效" });
      render();
      toast("审核已通过", "已触发下一步流程，并写入审核记录。");
    }

        const id = `TASK-${Date.now()}`;
        tasks.unshift({ id, name:qs("#newTaskName").value, type:qs("#newTaskType").value, stage:"目标理解", progress:6, owner:"AI Agent", status:"执行中", credits:0, next:"读取数据与企业规则", steps:["目标理解","数据采集","规则过滤","生成结果","进入审核"] });

        tasks.unshift({ id, name:"AI 规划任务：" + (qs("#plannerGoal").value.slice(0,18)), type:"开品任务", stage:"数据采集", progress:12, owner:"AI Agent", status:"执行中", credits:180, next:"调用 ERP、广告、1688 和规则中心", steps:["目标理解","数据采集","规则过滤","选品结论","Brief","内容生成","生命周期"] });

      taskToReview(el){ const t=tasks.find(x=>x.id===el.dataset.id); reviews.unshift({ id:`REV-${Date.now()}`, type:"任务结果审核", sku:"--", product:t?.name || "AI 任务结果", task:t?.name || "", conclusion:"AI 任务结果待人工确认", evidence:"系统生成结构化结果、依据和建议动作", risk:"中", status:"待审核", due:"今天", owner:"运营主管" }); closeDrawer(); setView("reviews"); toast("已进入审核中心", "任务结果已生成审核记录。"); },
      openReview(el){ const r=reviews.find(x=>x.id===el.dataset.id); if(!r)return; openDrawer(`${r.type}：${r.product}`, `<div class="card"><strong>AI 结论</strong><div class="meta">${r.conclusion}</div></div><div class="card"><strong>判断依据</strong><div class="meta">${r.evidence}</div></div><div class="card"><strong>风险提示</strong>${status(r.risk)}</div>`, `<button class="btn" data-action="reassignReview" data-id="${r.id}">转交</button><button class="btn" data-action="regenerateReview" data-id="${r.id}">重新生成</button><button class="btn danger" data-action="rejectReview" data-id="${r.id}">驳回</button><button class="btn primary" data-action="approveReview" data-id="${r.id}">通过</button>`); },

      reassignReview(){ toast("已转交", "审核任务已转交给对应负责人。"); },
      regenerateReview(){ toast("已重新生成", "AI 将基于审核意见重新生成结果。"); },
      bulkApprove(){ reviews.filter(r=>r.risk==="低").forEach(r=>r.status="通过"); render(); toast("低风险审核已批量通过", "记录已写入审核链路。"); },
      bulkReject(){ toast("批量驳回", "请选择结构化驳回原因后提交。"); },
      openOpportunity(el){ openDetailForAny(el.dataset.id); },
      approveOpportunity(el){ const o=opportunities.find(x=>x.id===el.dataset.id); if(o)o.status="已生成 Brief"; toast("候选品已通过", "已生成商品 Brief，并进入内容准备。"); render(); },
      rejectOpportunity(el){ const o=opportunities.find(x=>x.id===el.dataset.id); if(o){o.grade="C";o.status="已淘汰";} toast("已进入淘汰池", "淘汰原因将用于选品规则回流。"); render(); },
      importAsin(){ openModal("导入 ASIN / 关键词", `<textarea class="textarea">B0KITCH42\npearl headbands for women\ndesk cable organizer</textarea>`, `<button class="btn" data-action="closeModal">取消</button><button class="btn primary" data-action="closeModal">开始导入</button>`); },
      runSelection(){ toast("选品漏斗已运行", "已完成硬规则、利润、需求、竞争和 1688 匹配。"); },
      openBrief(el){ const b=briefs.find(x=>x.id===el.dataset.id); openDrawer(b.name, briefDetail(b), `<button class="btn" data-action="generateContentFromBrief" data-id="${b.id}">生成内容</button><button class="btn primary" data-action="submitBriefReview">提交审核</button>`); },
      createBrief(){ toast("Brief 已创建", "可从选品结论、历史商品或手工录入生成。"); },
      submitBriefReview(){ reviews.unshift({id:`REV-${Date.now()}`, type:"商品 Brief 审核", sku:"YL-KIT-042", product:"可折叠硅胶沥水篮", task:"Brief 提交", conclusion:"Brief 完整度 92%，建议通过", evidence:"产品事实、成本、关键词和生命周期计划基本完整", risk:"低", status:"待审核", due:"今天", owner:"运营主管"}); setView("reviews"); toast("已提交审核", "Brief 审核记录已生成。"); },
      saveBrief(){ toast("Brief 已保存", "下游图片、Listing、刊登草稿将使用最新上下文。"); },
      generateContentFromBrief(){ setView("content"); toast("内容生成任务已创建", "图片、Listing、A+ 和视频脚本进入内容资产中心。"); },
      recalcProfit(){ toast("利润已重新测算", "已刷新乐观、基准、压力利润和广告生存能力。"); },
      pushSupplyToBrief(){ toast("已写入 Brief", "供应链与成本字段已更新。"); },
      generateAssetPack(){ toast("内容包已生成", "图片、Listing、A+ 和视频脚本任务已创建。"); },
      addToLibrary(){ toast("已加入成果库", "审核通过资产会沉淀到成果库。"); },
      toggleImage(el){ const id=el.dataset.id; state.selectedImages.has(id)?state.selectedImages.delete(id):state.selectedImages.add(id); render(); },
      regenerateImages(){ toast("图片重新生成中", "驳回原因将进入质量反馈中心。"); },
      approveImages(){ imageAssets.forEach(img=>{ if(state.selectedImages.has(img.id)) img.review="通过"; }); render(); toast("所选图片已通过", "图片已加入商品资产，可进入刊登草稿。"); },
      setListingVersion(el){ state.listingVersion=el.dataset.version; render(); },
      checkListing(){ toast("Listing 校验完成", "标题、敏感词、关键词覆盖和字段一致性已检查。"); },
      saveListing(){ listingVersions[state.listingVersion]=qs("#listingEditor").value; toast("Listing 已保存", "修改内容已进入版本记录。"); },
      submitListingReview(){ reviews.unshift({id:`REV-${Date.now()}`, type:"Listing 审核", sku:"YL-KIT-042", product:"可折叠硅胶沥水篮", task:"Listing 提交", conclusion:`${state.listingVersion} 待审核`, evidence:"规则校验通过，需人工确认表达", risk:"低", status:"待审核", due:"今天", owner:"运营主管"}); setView("reviews"); toast("Listing 已进入审核", "审核通过后可推送刊登草稿。"); },
      rejectListing(){ rejectReview("REV-003"); },
      validateDrafts(){ toast("草稿已重新校验", "风险字段和待人工确认项已刷新。"); },
      submitDraftReview(){ reviews.unshift({id:`REV-${Date.now()}`, type:"刊登草稿审核", sku:"YL-KIT-042", product:"可折叠硅胶沥水篮", task:"刊登草稿", conclusion:"草稿完整度 96%，可人工审核发布", evidence:"图片、Listing、属性和供应链字段基本完整", risk:"中", status:"待审核", due:"今天", owner:"运营主管"}); setView("reviews"); },
      syncLifecycle(){ toast("生命周期已同步", "销量、库存、广告、利润、Listing、Buy Box 状态已刷新。"); },
      generateLifecycleExceptions(){ exceptions.unshift({id:`EXC-${Date.now()}`, type:"D30 决策待处理", priority:"P0", sku:"YL-BEA-099", asin:"B0BEAU099", stage:"新品测试期", rule:"D30 黑名单 SKU", desc:"30 日销量 0，需停广告并填写失败原因", action:"加入黑名单，进入清货复盘", owner:"运营主管", status:"待处理", due:"今天"}); setView("exceptions"); toast("异常已生成", "D7/D15/D23/D30 命中规则已写入异常和处置队列。"); },
      openLifecycle(el){ openDetailForAny(el.dataset.id); },
      confirmLifecycleAction(el){ const r=newProducts.find(x=>x.id===el.dataset.id); if(r)r.status="已确认"; logs.unshift({id:`LOG-${Date.now()}`, related:el.dataset.id, sku:r?.sku||"", asin:r?.asin||"", type:"确认处置", content:r?.suggestion||"", user:"运营主管", time:"刚刚", before:"待处理", after:"已确认", review:"3 天后", result:"待观察"}); render(); toast("处置建议已确认", "动作已写入日志。"); },
      adjustLifecycleAction(el){ addLog(el.dataset.id); },
      runHealthScan(){ toast("经营健康诊断完成", "老品异常已按销量、利润、广告、库存和 Listing 分类。"); },
      createExceptionFromHealth(){ exceptions.unshift({id:`EXC-${Date.now()}`, type:"老品利润异常", priority:"P1", sku:"YL-ADS-091", asin:"B0ADS091", stage:"常规运营期", rule:"利润/单 < 0", desc:"销售下滑，广告未收缩，单件利润转负", action:"收缩广告并检查转化", owner:"广告人员", status:"待处理", due:"明天"}); setView("exceptions"); },
      pullAds(){ toast("广告数据已拉取", "ACOS、TACoS、CPC、CTR、CVR 和搜索词报告已更新。"); },
      approveAdActions(){ toast("广告建议已审批", "否词、降预算和暂停广告动作已进入动作日志。"); },
      refreshReplenish(){ toast("补货建议已刷新", "已重新计算供应商交期、物流时效和库存覆盖。"); },
      approveReplenish(){ reviews.unshift({id:`REV-${Date.now()}`, type:"补货建议审核", sku:"YL-KIT-042", product:"可折叠硅胶沥水篮", task:"补货建议", conclusion:"建议补货 80 件", evidence:"D30 剩余库存 3，平均利润为正", risk:"中", status:"待审核", due:"今天", owner:"产品开发"}); setView("reviews"); },
      generateReviewReport(){ library.unshift({id:`LIB-${Date.now()}`, type:"复盘报告", sku:"YL-BEA-099", title:"失败产品复盘报告", source:"清货与复盘", review:"待审核", used:"规则回流", effect:"待确认", time:"刚刚"}); setView("library"); toast("复盘报告已生成", "失败原因将用于下一轮规则优化。"); },
      feedbackRule(){ rules.unshift({id:`RULE-${Date.now()}`, name:"便携化妆镜低价带风险下调", type:"选品规则", scope:"Amazon / UK / Beauty", condition:"低价带 + 高 CPC + 供应链无差异", action:"降低推荐权重", risk:"中", enabled:false, updated:"刚刚"}); setView("rules"); },
      openException(el){ const e=exceptions.find(x=>x.id===el.dataset.id); openDrawer(`${e.type} · ${e.sku}`, exceptionDetail(e), `<button class="btn" data-action="startException" data-id="${e.id}">开始处理</button><button class="btn" data-action="transferInactive" data-id="${e.id}">转不动销</button><button class="btn danger" data-action="ignoreException" data-id="${e.id}">忽略</button><button class="btn primary" data-action="completeException" data-id="${e.id}">完成</button>`); },
      startException(el){ const e=exceptions.find(x=>x.id===el.dataset.id); if(e)e.status="处理中"; closeDrawer(); render(); toast("异常已开始处理", "请填写处理动作或转入对应任务。"); },
      completeException(el){ const e=exceptions.find(x=>x.id===el.dataset.id); if(e){e.status="已完成"; logs.unshift({id:`LOG-${Date.now()}`, related:e.id, sku:e.sku, asin:e.asin, type:"异常处理", content:e.action, user:e.owner, time:"刚刚", before:"待处理", after:"已完成", review:"3 天后", result:"待观察"});} closeDrawer(); render(); toast("异常已完成", "处理动作已关联动作日志。"); },
      ignoreException(el){ openModal("忽略异常", `<div class="form-row"><label>忽略原因</label><textarea class="textarea" id="ignoreReason">业务已确认无需处理。</textarea></div>`, `<button class="btn" data-action="closeModal">取消</button><button class="btn danger" data-action="confirmIgnoreException" data-id="${el.dataset.id}">确认忽略</button>`); },
      confirmIgnoreException(el){ const e=exceptions.find(x=>x.id===el.dataset.id); if(e)e.status="已忽略"; closeModal(); closeDrawer(); render(); toast("异常已忽略", "忽略原因已记录，可追溯。"); },
      transferInactive(el){ const e=exceptions.find(x=>x.id===el.dataset.id); if(e) inactive.unshift({id:`INA-${Date.now()}`, sku:e.sku, asin:e.asin, site:"UK", node:"D15/D30", level:"清仓", price:"按规则降价", ad:"按建议收缩", replenish:"不补货", clearance:"进入处置", failure:"待填写", owner:e.owner, status:"待处理", due:"今天"}); closeDrawer(); setView("inactive"); toast("已转入不动销处置队列", "请继续确认价格、广告、补货和失败原因。"); },
      dedupeExceptions(){ toast("防重复校验完成", "同一 ASIN 同一天同类型异常不会重复生成。"); },
      createException(){ openModal("新增异常", `<div class="form-grid"><div class="form-row"><label>异常类型</label><input class="input" value="数据缺失"></div><div class="form-row"><label>SKU</label><input class="input" value="YL-KIT-042"></div><div class="form-row full"><label>异常说明</label><textarea class="textarea">关键字段缺失，阻断高质量生成。</textarea></div></div>`, `<button class="btn" data-action="closeModal">取消</button><button class="btn primary" data-action="closeModal">创建</button>`); },
      requireFailureReason(){ toast("失败原因检查完成", "D30 黑名单 / 强制清仓项必须填写失败原因。"); },
      completeInactive(){ inactive.forEach(i=>{ if(i.status==="待处理") i.status="已完成"; }); render(); toast("处置已完成", "动作日志和复盘记录已生成。"); },
      addLog(){ addLog(); },
      addLogFor(el){ addLog(el.dataset.id); },
      confirmAddLog(){ logs.unshift({id:`LOG-${Date.now()}`, related:qs("#logRelated").value, sku:qs("#logSku").value.split("/")[0].trim(), asin:qs("#logSku").value.split("/")[1]?.trim() || "", type:qs("#logType").value, content:qs("#logContent").value, user:qs("#roleSelect").value, time:"刚刚", before:"执行前数据", after:"待观察", review:qs("#logReview").value, result:"待观察"}); closeModal(); setView("logs"); toast("动作日志已保存", "后续复查结果会进入质量反馈和复盘。"); },
      addRule(){ openModal("新增规则", `<div class="form-grid"><div class="form-row"><label>规则名称</label><input class="input" id="ruleName" value="新品测试预算审批"></div><div class="form-row"><label>规则类型</label><select class="input" id="ruleType"><option>审核规则</option><option>选品规则</option><option>新品测试规则</option><option>广告规则</option><option>补货规则</option><option>清货规则</option></select></div><div class="form-row full"><label>触发条件</label><textarea class="textarea" id="ruleCondition">新品 7 天预算超过 £20。</textarea></div></div>`, `<button class="btn" data-action="closeModal">取消</button><button class="btn primary" data-action="confirmAddRule">保存规则</button>`); },
      confirmAddRule(){ rules.unshift({id:`RULE-${Date.now()}`, name:qs("#ruleName").value, type:qs("#ruleType").value, scope:"Amazon / UK", condition:qs("#ruleCondition").value, action:"转运营主管审批", risk:"中", enabled:true, updated:"刚刚"}); closeModal(); render(); toast("规则已新增", "规则将被 AI Agent 和异常队列调用。"); },
      editRule(el){ const r=rules.find(x=>x.id===el.dataset.id); openModal("编辑规则", `<div class="form-row"><label>规则名称</label><input class="input" id="editRuleName" value="${escapeHtml(r.name)}"></div><div class="form-row"><label>处理建议</label><textarea class="textarea" id="editRuleAction">${escapeHtml(r.action)}</textarea></div>`, `<button class="btn" data-action="closeModal">取消</button><button class="btn primary" data-action="confirmEditRule" data-id="${r.id}">保存</button>`); },
      confirmEditRule(el){ const r=rules.find(x=>x.id===el.dataset.id); if(r){r.name=qs("#editRuleName").value;r.action=qs("#editRuleAction").value;r.updated="刚刚";} closeModal(); render(); toast("规则已更新", "规则变更记录已保留。"); },
      toggleRule(el){ const r=rules.find(x=>x.id===el.dataset.id); if(r)r.enabled=!r.enabled; render(); toast("规则状态已变更", r?.enabled ? "已启用" : "已禁用，不再触发新异常。"); },
      saveRules(){ toast("规则已保存", "规则中心已同步到 Agent 编排和异常队列。"); },
      syncQuality(){ toast("质量数据已同步", "CTR、CVR、ACOS、动销率、断货率和清货表现已回填。"); },
      applyQualitySuggestions(){ toast("优化建议已进入规则审核", "结构化反馈已转入规则中心待审核。"); },
      createRuleFromQuality(el){ rules.unshift({id:`RULE-${Date.now()}`, name:"质量反馈规则建议", type:"质量回流规则", scope:"Amazon / 全站点", condition:"来自 " + el.dataset.id, action:"根据反馈优化模板与阈值", risk:"中", enabled:false, updated:"刚刚"}); setView("rules"); },
      openQuality(el){ openDetailForAny(el.dataset.id); },
      reuseAsset(){ toast("成果已复用", "已复制到当前商品任务上下文。"); },
      exportAsset(){ toast("成果已导出", "原型中模拟导出 Brief、图片、Listing 或复盘报告。"); },
      creditRecharge(){ toast("充值记录", "管理员可查看积分充值、扣减、失败退回。"); },
      exportCredits(){ toast("积分明细已导出", "任务、模块、积分、状态与退回记录已导出。"); },
      testConnections(){ toast("连接测试完成", "ERP、广告、1688、平台 Listing、通知渠道均可用。"); },
      saveSettings(){ toast("设置已保存", "权限、通知和数据安全策略已更新。"); },
      openRow(el){ openDetailForAny(el.dataset.id); },
      markDone(el){ const id=el.dataset.id; [drafts, newProducts, healthRows, adRows, replenishment, clearance, inactive].flat().forEach(row=>{ if(row.id===id) row.status="已完成"; }); closeDrawer(); render(); toast("状态已更新", "已完成并可关联动作日志。"); },
      openSearch,
      openNotifications,
      searchOpen(el){ closeModal(); openDetailForAny(el.dataset.id); },
      syncData(){ toast("数据已同步", "ERP、广告、库存、采购、Listing 和生命周期主表已刷新。"); }
    };

    function openSearch() {
      const query = qs("#globalSearch").value.trim();
      const rows = [...tasks.map(x=>({id:x.id,type:"任务",title:x.name})), ...products.map(x=>({id:x.id,type:"商品",title:`${x.id} ${x.name}`})), ...exceptions.map(x=>({id:x.id,type:"异常",title:`${x.type} ${x.sku}`})), ...library.map(x=>({id:x.id,type:"成果",title:x.title}))];
      const matched = rows.filter(row => !query || row.title.toLowerCase().includes(query.toLowerCase()) || row.type.includes(query)).slice(0,8);
      openModal("全局搜索", `
        <div class="field" style="width:100%"><label>搜索</label><input id="modalSearchInput" value="${escapeHtml(query)}" placeholder="任务、SKU、ASIN、异常、成果"></div>
        <div class="card-list" id="modalSearchResults">${matched.map(row=>`<button class="card" data-action="searchOpen" data-id="${row.id}"><div class="card-top"><div><strong>${escapeHtml(row.title)}</strong><div class="meta">${row.type}</div></div><i data-lucide="arrow-right"></i></div></button>`).join("") || `<div class="empty">没有搜索结果</div>`}</div>
      `, `<button class="btn primary" data-action="closeModal">关闭</button>`);
    }

    function openNotifications() {
      openDrawer("通知中心", `
        <div class="card-list">
          <div class="card"><div class="card-top"><strong>P0 异常：D15 弱动销</strong>${status("P0")}</div><div class="meta">YL-HOM-033 需要今天处理。</div><button class="btn small" data-view="exceptions">去处理</button></div>
          <div class="card"><div class="card-top"><strong>审核任务：图片审核</strong>${status("待审核")}</div><div class="meta">硅胶沥水篮 5 张图片等待确认。</div><button class="btn small" data-view="reviews">去审核</button></div>
          <div class="card"><div class="card-top"><strong>积分提醒</strong>${status("正常")}</div><div class="meta">今日消耗 392，剩余 12,480。</div><button class="btn small" data-view="credits">查看积分</button></div>
        </div>
      `);
    }

    document.addEventListener("click", event => {
      const view = event.target.closest("[data-view]");
      if (view) {
        event.preventDefault();
        closeDrawer();
        closeModal();
        setView(view.dataset.view);
        return;
      }
      const action = event.target.closest("[data-action]");
      if (!action) return;
      event.preventDefault();
      const handler = handlers[action.dataset.action];
      if (handler) handler(action);
    });

    document.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") { event.preventDefault(); openSearch(); }
      if (event.key === "Enter" && document.activeElement?.id === "globalSearch") openSearch();
      if (event.key === "Escape") { closeModal(); closeDrawer(); }
    });

    render();
  </script>
</body>
</html>
